<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles/styles.css">
        <title>Create an Account</title>
    </head>
    <body>
        <div class="title">
            <h1>My Website</h1>
        </div>
        <div class="container">
            <form>
                <label id="username" class="username">Username: </label>
                <input type="text" placeholder="Enter your username..." maxlength="100" minlength="3" required><br><br>
                <label>Full Name: </label>
                <input type="text" placeholder="Enter your name..." maxlength="100" minlength="3" required><br><br>
                <label>Age: </label>
                <input type="number" placeholder="Enter your age..." max="100" min="10" required><br><br>
                <label>Password: </label>
                <input type="password" placeholder="Enter your password..." maxlength="100" minlength="3" required><br><br>
                <label>Confirm Password: </label>
                <input type="password" placeholder="Enter your password again..." maxlength="100" minlength="3" required><br><br>
                <label>Gender: </label>
                <input type="radio" name="gender" value="male">Male <input type="radio" name="gender" value="female">Female<br><br>
                <input type="checkbox" id="show-password"> <label for="show-password">Show Password</label><br><br>
                <label>Role: </label>
                <select>
                    <option value="">---</option>
                </select><br><br>
                <a target="_blank" href="login.html">Already have an account? Login here</a><br><br>
                <button type="button">Register</button>
            </form>
        </div>
        <script src="./scripts/index.js"></script>
    </body>
</html>
