<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        form {
            max-width: 400px;
        }

        .navbar .container {
            justify-content: flex-start;
        }

        .navbar-brand {
            min-width: 0;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        .btn-toolbar {
            gap: 8px;
        }

        .btn-toolbar .btn {
            white-space: normal;
        }

        .offcanvas-start {
            --bs-offcanvas-width: min(260px, 80vw);
            max-width: 80vw;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-control {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #6c757d;
            padding: 0;
            line-height: 1;
        }

        label[for="username"],
        label[for="password"] {
            display: inline-block;
            width: 80px;
        }

        form > input[type="text"],
        form > input[type="password"] {
            margin-bottom: 10px;
        }

        form > button[type="submit"] {
            display: block;
            margin: 10px 0;
        }

        @media (max-width: 600px) {
            label[for="username"],
            label[for="password"] {
                display: block;
                width: auto;
            }

            .btn-toolbar,
            .btn-toolbar .btn-group {
                display: grid;
                width: 100%;
            }

            .btn-toolbar .btn-group {
                margin-right: 0 !important;
            }

            .btn-toolbar .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar bg-body-tertiary border-bottom">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand ms-3 me-0" href="#">Placeholder</a>
            <div class="offcanvas offcanvas-start" tabindex="-1" id="mainMenu" aria-labelledby="mainMenuLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="mainMenuLabel">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="btn-toolbar mb-4" role="toolbar" aria-label="Toolbar with placeholder button groups">
            <div class="btn-group me-2" role="group" aria-label="Main actions">
                <button class="btn btn-outline-secondary" type="button">Placeholder 1</button>
                <button class="btn btn-outline-secondary" type="button">Placeholder 2</button>
                <button class="btn btn-outline-secondary" type="button">Placeholder 3</button>
            </div>
            <div class="btn-group" role="group" aria-label="Extra actions">
                <button class="btn btn-outline-primary" type="button">Action</button>
            </div>
        </div>

        <h2>Login</h2>
        <form>
            <label class="form-label" for="username">Username:</label>
            <input class="form-control" id="username" name="username" type="text" required><br>

            <label class="form-label" for="password">Password:</label>
            <div class="password-wrapper mb-3">
                <input class="form-control" id="password" name="password" type="password" required>
                <button class="password-toggle" id="showPassword" type="button" aria-label="Show password">
                    <i class="bi bi-eye"></i>
                </button>
            </div>

            <button class="btn btn-primary" type="submit">Login</button>
        </form>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const showPasswordButton = document.getElementById('showPassword');
        const showPasswordIcon = showPasswordButton.querySelector('i');

        showPasswordButton.addEventListener('click', function () {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            showPasswordIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
            this.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function () {
           $('#loginButton').click(function (event) {
               event.preventDefault();
               const username = $('#username').val();
               const password = $('#password').val();
               alert(`Username: ${username}\nPassword: ${password}`);
           });
            
        });
    </script>
</body>
</html>
