<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <main class="container min-vh-100 d-flex flex-column py-4">
        <header class="mb-3">
            <h1 class="h3 mb-0">chatter</h1>
        </header>

        <div id="chatScreen" class="bg-black text-white rounded flex-grow-1 p-3 mb-3"></div>

        <div class="d-flex gap-2">
            <div class="input-group">
                <input id="chatInput" class="form-control" type="text" placeholder="Type a message" aria-label="Chat message">
                <button id="sendButton" class="btn btn-primary" type="button">Send</button>
            </div>
            <button id="clearButton" class="btn btn-outline-danger" type="button">Clear</button>
        </div>
    </main>
</body>
</html>
